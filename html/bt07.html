<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>BT07 - SVG</title>
<style>
    body{
        font-family: "Times New Roman", serif;
        background:#ffffff;
    }
    .box{
        width:320px;
        border:2px solid #ddd;
        margin:20px auto;
        padding:10px;
    }
    h2{
        margin:0 0 10px;
        font-size:24px;
        font-weight:bold;
    }
</style>
</head>
<body>

<div class="box">
    <h2>Bài 1: Vẽ các hình cơ bản</h2>

    <svg width="280" height="170" viewBox="0 0 280 170">

        <rect x="0"
              y="16"
              width="260"
              height="120"
              fill="steelblue"/>

        <circle cx="130"
                cy="76"
                r="45"
                fill="tomato"/>

        <line x1="0"
              y1="16"
              x2="260"
              y2="136"
              stroke="yellow"
              stroke-width="4"/>

    </svg>
</div>

<div class="box">
    <h2>Bài 2: Vẽ ngôi nhà đơn giản</h2>

    <svg width="280" height="230" viewBox="0 0 280 230">

        <polygon points="140,45 60,110 220,110"
                 fill="#d86f11"/>
        <rect x="80"
              y="110"
              width="120"
              height="90"
              fill="#8b4513"/>
        <rect x="98"
              y="138"
              width="36"
              height="36"
              fill="#a3d2f0"
              stroke="black"
              stroke-width="2"/>
        <rect x="162"
              y="156"
              width="28"
              height="44"
              fill="#7a4a1a"/>

    </svg>
</div>
<hr>
<a href="index.html">VỀ TRANG CHỦ</a>
</body>
</html>
